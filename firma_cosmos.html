<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <table border="0" cellpadding="0" cellspacing="0" style="font-family: Arial, sans-serif; text-align: left; line-height: 1.2; color: #000000; border-collapse: collapse; background-color: #ffffff; width: 600px;">
        <tbody>
            <tr>
                <!-- Columna Izquierda: Logos -->
                <td style="padding: 14px 30px 10px 0; vertical-align: top; text-align: center; width: 180px;">
                    <!-- Logo Principal Cosmos - Alineado horizontalmente con el Nombre -->
                    <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/f6272b1f8d3faa3b9e76b45332f7bb8175dbee83/images/logo_galeria_cosmos.svg" alt="Cosmos Global Logistics" style="width: 150px; height: auto; display: block; margin: 0 auto 80px auto; padding-left: 10px;">
                    
                    <div style="margin-top: 20px;">
                        <!-- Logo Grupo Andino - Se mantiene en la parte inferior -->
                        <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/f6272b1f8d3faa3b9e76b45332f7bb8175dbee83/images/logo_grupo_andino_new.svg" alt="ANDINO" style="width: 110px; height: auto; display: block; margin: 0 auto;">
                    </div>
                </td>

                <!-- Línea Divisoria Vertical -->
                <td style="border-left: 1px solid #0056b3; width: 1px; padding: 0; vertical-align: stretch;"></td>

                <!-- Columna Derecha: Información -->
                <td style="padding: 10px 0 10px 30px; vertical-align: middle;">
                    
                    <!-- Nombre y Cargo -->
                    <table border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 12px; width: 100%;">
                        <tr>
                            <td style="vertical-align: middle; width: 30px;">
                                <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/c26310b72334e6c6dcf0d0c07c5d0c20a68e787b/images/user.svg" alt="" style="width: 22px; height: 22px; display: block;">
                            </td>
                            <td>
                                <div style="font-size: 20px; font-weight: bold; color: #000000;">Samuel Izquierdo</div>
                                <div style="font-size: 13px; color: #444444; margin-top: 2px;">Sub Gerente de Marketing</div>
                            </td>
                        </tr>
                    </table>

                    <!-- Teléfonos -->
                    <table border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 10px; width: 100%;">
                        <tr>
                            <td style="vertical-align: middle; width: 30px;">
                                <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/c26310b72334e6c6dcf0d0c07c5d0c20a68e787b/images/phone-call.svg" alt="" style="width: 22px; height: 22px; display: block;">
                            </td>
                            <td style="font-size: 16px; color: #000000; font-weight: 500;">
                                315 4200 | 914419521
                            </td>
                        </tr>
                    </table>

                    <!-- Email y Web en una sola línea -->
                    <table border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 15px; width: 100%;">
                        <tr>
                            <!-- Icono Email -->
                            <td style="vertical-align: middle; width: 30px;">
                                <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/c26310b72334e6c6dcf0d0c07c5d0c20a68e787b/images/mail.svg" alt="✉" style="width: 22px; height: 22px; display: block;">
                            </td>
                            <!-- Texto Email -->
                            <td style="font-size: 14px; color: #444444; white-space: nowrap; padding-left: 10px;">
                                <a href="mailto:samuel.izquierdo@andino-office.com.pe" style="color: #444444; text-decoration: none;" target="_blank">samuel.izquierdo@andino-office.com.pe</a>
                            </td>
                            <!-- Icono Web -->
                            <td style="vertical-align: middle; width: 30px; padding-left: 25px;">
                                <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/867aff26aa80b1f4040474b49c6b8c4bb2beac38/images/url.svg" alt="" style="width: 22px; height: 22px; display: block;">
                            </td>
                            <!-- Texto Web -->
                            <td style="font-size: 14px; font-weight: bold; color: #000000; white-space: nowrap; padding-left: 10px;">
                                <a href="https://www.cosmos.com.pe" target="_blank" style="color: #000000; text-decoration: none;">www.cosmos.com.pe</a>
                            </td>
                        </tr>
                    </table>

                    <!-- Mensaje Ecológico -->
                    <table border="0" cellpadding="0" cellspacing="0" style="width: 100%;">
                        <tr>
                            <td style="vertical-align: middle; width: 30px;">
                                <img src="https://raw.githubusercontent.com/adolfoworkhome/firmas-andino/867aff26aa80b1f4040474b49c6b8c4bb2beac38/images/tree.svg" alt="" style="width: 22px; height: 22px; display: block;">
                            </td>
                            <td style="font-size: 12px; color: #0077c8; line-height: 1.2;">
                                Antes de imprimir este documento, piensa en el medio ambiente.<br>
                                Ay&uacute;danos a impulsar un cambio ambiental responsable.
                            </td>
                        </tr>
                    </table>

                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
